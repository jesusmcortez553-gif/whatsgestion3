<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo redondeado -->
  <rect width="200" height="200" rx="45" fill="#1e40af"/>
  
  <!-- Chat bubble (globo de conversación) -->
  <path d="M 50 60 Q 50 50 60 50 L 110 50 Q 120 50 120 60 L 120 95 L 130 105 L 120 95 L 120 60 Q 120 55 115 55 L 60 55 Q 55 55 55 60 L 55 90 Q 55 95 50 95 Z" fill="#ffffff" opacity="0.9"/>
  
  <!-- Líneas de texto en el chat -->
  <line x1="60" y1="68" x2="105" y2="68" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="78" x2="100" y2="78" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Herramienta (llave inglesa) -->
  <g transform="translate(90, 115)">
    <!-- Mango de la llave -->
    <rect x="-8" y="0" width="16" height="35" rx="8" fill="#ffffff" opacity="0.9"/>
    
    <!-- Cabeza de la llave -->
    <circle cx="0" cy="-8" r="14" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
    <circle cx="0" cy="-8" r="10" fill="none" stroke="#1e40af" stroke-width="2"/>
  </g>
  
  <!-- Pequeño punto de énfasis -->
  <circle cx="150" cy="50" r="6" fill="#10b981" opacity="0.8"/>
</svg>
